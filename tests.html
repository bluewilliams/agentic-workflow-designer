<body>
<h1>AWD Test Suite</h1>
<p class="subtitle">Agentic Workflow Designer - iframe-based regression tests</p>
<div class="bar" id="bar"><span class="total">Running&hellip;</span></div>
<div id="results"></div>
<iframe id="app" src="index.html" style="display:none;width:1024px;height:768px"></iframe>

<script>
// ═══════════════════════════════════════════════════════════
// SECTION 2: Minimal Test Framework (zero dependencies)
// ═══════════════════════════════════════════════════════════
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  if (currentSuite) {
    // Nested describe: create a child group inside the parent suite
    const parent = currentSuite;
    const child = { name, tests: [], beforeEach: parent.beforeEach, afterEach: parent.afterEach, parent };
    parent.children = parent.children || [];
    parent.children.push(child);
    currentSuite = child;
    fn();
    currentSuite = parent;
  } else {
    // Top-level describe
    const suite = { name, tests: [], children: [], beforeEach: null, afterEach: null };
    currentSuite = suite;
    suites.push(suite);
    fn();
    currentSuite = null;
  }
}

function it(name, fn) {
  if (!currentSuite) throw new Error('it() must be inside describe()');
  currentSuite.tests.push({ name, fn });
}

function beforeEach(fn) {
  if (!currentSuite) throw new Error('beforeEach() must be inside describe()');
  const inherited = currentSuite.beforeEach;
  currentSuite.beforeEach = inherited ? () => { inherited(); fn(); } : fn;
}

function afterEach(fn) {
  if (!currentSuite) throw new Error('afterEach() must be inside describe()');
  currentSuite.afterEach = fn;
}

class Expectation {
  constructor(actual) { this.actual = actual; }
  toBe(expected) {
    if (this.actual !== expected)
      throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(this.actual)}`);
  }
  toEqual(expected) {
    const a = JSON.stringify(this.actual), b = JSON.stringify(expected);
    if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
  }
  toContain(str) {
    if (typeof this.actual === 'string') {
      if (!this.actual.includes(str))
        throw new Error(`Expected string to contain "${str}".\nGot: "${this.actual.slice(0, 300)}..."`);
    } else if (Array.isArray(this.actual)) {
      if (!this.actual.includes(str))
        throw new Error(`Expected array to contain ${JSON.stringify(str)}`);
    } else {
      throw new Error(`toContain requires string or array, got ${typeof this.actual}`);
    }
  }
  toNotContain(str) {
    if (typeof this.actual === 'string') {
      if (this.actual.includes(str))
        throw new Error(`Expected string NOT to contain "${str}"`);
    } else if (Array.isArray(this.actual)) {
      if (this.actual.includes(str))
        throw new Error(`Expected array NOT to contain ${JSON.stringify(str)}`);
    }
  }
  toBeTruthy() {
    if (!this.actual) throw new Error(`Expected truthy, got ${JSON.stringify(this.actual)}`);
  }
  toBeFalsy() {
    if (this.actual) throw new Error(`Expected falsy, got ${JSON.stringify(this.actual)}`);
  }
  toBeGreaterThan(n) {
    if (!(this.actual > n)) throw new Error(`Expected ${this.actual} > ${n}`);
  }
  toBeLessThan(n) {
    if (!(this.actual < n)) throw new Error(`Expected ${this.actual} < ${n}`);
  }
  toBeNull() {
    if (this.actual !== null) throw new Error(`Expected null, got ${JSON.stringify(this.actual)}`);
  }
  toMatch(regex) {
    if (!regex.test(this.actual))
      throw new Error(`Expected "${String(this.actual).slice(0, 200)}" to match ${regex}`);
  }
  toBeInstanceOf(cls) {
    if (!(this.actual instanceof cls))
      throw new Error(`Expected instance of ${cls.name}`);
  }
}

function expect(val) { return new Expectation(val); }

async function runAll(win) {
  const t0 = performance.now();
  let totalPass = 0, totalFail = 0;
  const failures = [];
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  function runGroup(group, testsDiv, suiteName) {
    let gPass = 0, gFail = 0;
    for (const test of group.tests) {
      try {
        if (group.beforeEach) group.beforeEach();
        test.fn();
        if (group.afterEach) group.afterEach();
        gPass++; totalPass++;
        testsDiv.innerHTML += `<div class="test-row"><span class="icon">✅</span><span class="test-name">${esc(test.name)}</span></div>`;
      } catch (e) {
        gFail++; totalFail++;
        failures.push({ suite: suiteName, test: test.name, error: e.message });
        testsDiv.innerHTML += `<div class="test-row"><span class="icon">❌</span><span class="test-name failed">${esc(test.name)}</span></div>`;
        testsDiv.innerHTML += `<div class="error-detail">${esc(e.message)}</div>`;
      }
    }
    if (group.children) {
      for (const child of group.children) {
        testsDiv.innerHTML += `<div class="test-row" style="padding:6px 0 2px;border-bottom:none"><span style="font-size:11px;font-weight:600;color:var(--text2)">${esc(child.name)}</span></div>`;
        const childResult = runGroup(child, testsDiv, suiteName + ' > ' + child.name);
        gPass += childResult.pass;
        gFail += childResult.fail;
      }
    }
    return { pass: gPass, fail: gFail };
  }

  for (const suite of suites) {
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    const testsDiv = document.createElement('div');
    testsDiv.className = 'tests';

    const { pass: suitePass, fail: suiteFail } = runGroup(suite, testsDiv, suite.name);

    const badge = suiteFail === 0
      ? `<span class="badge green">${suitePass} passed</span>`
      : `<span class="badge red">${suiteFail} failed</span>`;
    summary.innerHTML = `${badge} ${esc(suite.name)} <span style="color:var(--text2);font-weight:400;font-size:11px;margin-left:auto">${suitePass + suiteFail} tests</span>`;
    details.appendChild(summary);
    details.appendChild(testsDiv);
    if (suiteFail > 0) details.open = true;
    resultsEl.appendChild(details);
  }

  const elapsed = (performance.now() - t0).toFixed(0);
  const bar = document.getElementById('bar');
  bar.innerHTML = `<span class="pass">✅ ${totalPass} passed</span>`
    + (totalFail > 0 ? `<span class="fail">❌ ${totalFail} failed</span>` : '')
    + `<span class="total">${totalPass + totalFail} total</span>`
    + `<span class="time">${elapsed}ms</span>`;

  // CLI-readable output: hidden element + console for headless Chrome
  const cliData = { pass: totalPass, fail: totalFail, total: totalPass + totalFail, elapsed, failures };
  const cliEl = document.createElement('pre');
  cliEl.id = 'cli-output';
  cliEl.style.display = 'none';
  cliEl.textContent = JSON.stringify(cliData);
  document.body.appendChild(cliEl);
  console.log('TEST_RESULT:' + JSON.stringify(cliData));
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// SECTION 3: Test Helpers
// ═══════════════════════════════════════════════════════════
let win; // set on iframe load

function resetState() {
  win.state.nodes = [];
  win.state.connections = [];
  win.state.selectedId = null;
  win.state.mode = 'select';
  win.state.connectFrom = null;
  win.state.pan = { x: 0, y: 0 };
  win.state.zoom = 1;
  win.state.nextId = 1;
  win.state.dragging = null;
  win.state.isPanning = false;
  win.state.mousePos = { x: 0, y: 0 };
  win.state.exportFormat = 'prompt';
  win.state.memoryEnabled = false;
  win.state.defaultModel = 'opus-4.6';
  win.state.repositories = [];
  win.state.activePreset = null;
  // Reset DOM inputs
  const wfName = win.document.getElementById('workflowName');
  if (wfName) wfName.value = '';
  const storyInput = win.document.getElementById('storyInput');
  if (storyInput) storyInput.value = '';
  const memToggle = win.document.getElementById('memoryToggle');
  if (memToggle) memToggle.checked = false;
  const memPath = win.document.getElementById('memoryPathField');
  if (memPath) memPath.style.display = 'none';
}

function clearStorage() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('awd_')) keys.push(k);
  }
  keys.forEach(k => localStorage.removeItem(k));
}

function buildTestWorkflow(shape) {
  resetState();
  const refs = {};

  if (shape === 'linear') {
    refs.input = win.addNode('input', 100, 200, 'Requirements');
    refs.planner = win.addNode('agent', 350, 200, 'Planner', { agentType:'planner', model:'opus-4.6', tools:['Read','Grep','Glob'], prompt:'Plan it.', maxTurns:5 });
    refs.implementer = win.addNode('agent', 600, 200, 'Implementer', { agentType:'coder', model:'opus-4.6', tools:['Read','Write','Edit'], prompt:'Build it.', maxTurns:10 });
    refs.output = win.addNode('output', 850, 200, 'Done', { deliverable:'Tested code', format:'code' });
    win.addConnection(refs.input.id, refs.planner.id);
    win.addConnection(refs.planner.id, refs.implementer.id);
    win.addConnection(refs.implementer.id, refs.output.id);
  }

  if (shape === 'parallel') {
    refs.input = win.addNode('input', 100, 250, 'Spec');
    refs.fork = win.addNode('parallel', 350, 250, 'Fork', { strategy:'all' });
    refs.backend = win.addNode('agent', 600, 150, 'Backend', { agentType:'backend', model:'opus-4.6', tools:['Read','Write','Edit','Bash'], prompt:'Backend work.', maxTurns:10 });
    refs.frontend = win.addNode('agent', 600, 350, 'Frontend', { agentType:'frontend', model:'opus-4.6', tools:['Read','Write','Edit'], prompt:'Frontend work.', maxTurns:10 });
    refs.reviewer = win.addNode('agent', 850, 250, 'Reviewer', { agentType:'reviewer', model:'opus-4.6', tools:['Read','Grep'], prompt:'Review it.', maxTurns:5 });
    refs.output = win.addNode('output', 1100, 250, 'Ready', { deliverable:'Full stack', format:'code' });
    win.addConnection(refs.input.id, refs.fork.id);
    win.addConnection(refs.fork.id, refs.backend.id);
    win.addConnection(refs.fork.id, refs.frontend.id);
    win.addConnection(refs.backend.id, refs.reviewer.id);
    win.addConnection(refs.frontend.id, refs.reviewer.id);
    win.addConnection(refs.reviewer.id, refs.output.id);
  }

  if (shape === 'decision') {
    refs.input = win.addNode('input', 100, 200, 'Bug Report');
    refs.implementer = win.addNode('agent', 350, 200, 'Implementer', { agentType:'coder', model:'opus-4.6', tools:['Read','Write','Edit'], prompt:'Fix it.', maxTurns:10 });
    refs.reviewer = win.addNode('agent', 600, 200, 'Reviewer', { agentType:'reviewer', model:'opus-4.6', tools:['Read','Grep'], prompt:'Review it.', maxTurns:5 });
    refs.decision = win.addNode('decision', 850, 200, 'Review OK?', { condition:'All checks pass', yesLabel:'Pass', noLabel:'Revise', maxRevisions:3 });
    refs.tester = win.addNode('agent', 1100, 200, 'Tester', { agentType:'tester', model:'opus-4.6', tools:['Read','Bash'], prompt:'Test it.', maxTurns:10 });
    refs.output = win.addNode('output', 1350, 200, 'Fixed', { deliverable:'Verified fix', format:'code' });
    win.addConnection(refs.input.id, refs.implementer.id);
    win.addConnection(refs.implementer.id, refs.reviewer.id);
    win.addConnection(refs.reviewer.id, refs.decision.id);
    win.addConnection(refs.decision.id, refs.implementer.id, 'Revise');
    win.addConnection(refs.decision.id, refs.tester.id, 'Pass');
    win.addConnection(refs.tester.id, refs.output.id);
  }

  if (shape === 'complex') {
    refs.input = win.addNode('input', 100, 300, 'Spec');
    refs.planner = win.addNode('agent', 350, 300, 'Planner', { agentType:'planner', model:'opus-4.6', tools:['Read','Grep','Glob'], prompt:'Plan.', maxTurns:5 });
    refs.fork = win.addNode('parallel', 600, 300, 'Fork', { strategy:'all' });
    refs.backend = win.addNode('agent', 850, 200, 'Backend', { agentType:'backend', model:'opus-4.6', tools:['Read','Write','Edit','Bash'], prompt:'API.', maxTurns:15 });
    refs.frontend = win.addNode('agent', 850, 400, 'Frontend', { agentType:'frontend', model:'opus-4.6', tools:['Read','Write','Edit'], prompt:'UI.', maxTurns:15 });
    refs.reviewer = win.addNode('agent', 1100, 300, 'Reviewer', { agentType:'reviewer', model:'opus-4.6', tools:['Read','Grep'], prompt:'Review.', maxTurns:5 });
    refs.decision = win.addNode('decision', 1350, 300, 'Review OK?', { condition:'All checks pass', yesLabel:'Pass', noLabel:'Revise', maxRevisions:3 });
    refs.tester = win.addNode('agent', 1600, 300, 'Tester', { agentType:'tester', model:'opus-4.6', tools:['Read','Bash'], prompt:'Test.', maxTurns:10 });
    refs.output = win.addNode('output', 1850, 300, 'Complete', { deliverable:'Tested feature', format:'code' });
    win.addConnection(refs.input.id, refs.planner.id);
    win.addConnection(refs.planner.id, refs.fork.id);
    win.addConnection(refs.fork.id, refs.backend.id);
    win.addConnection(refs.fork.id, refs.frontend.id);
    win.addConnection(refs.backend.id, refs.reviewer.id);
    win.addConnection(refs.frontend.id, refs.reviewer.id);
    win.addConnection(refs.reviewer.id, refs.decision.id);
    win.addConnection(refs.decision.id, refs.backend.id, 'Revise');
    win.addConnection(refs.decision.id, refs.tester.id, 'Pass');
    win.addConnection(refs.tester.id, refs.output.id);
  }

  return refs;
}

// Helper: simulate selecting a value in a custom-select dropdown
function selectCustomOption(container, value) {
  const opt = container.querySelector(`.custom-select-option[data-value="${value}"]`);
  if (opt) opt.click();
}

// ═══════════════════════════════════════════════════════════
// SECTION 4: Test Suites
// ═══════════════════════════════════════════════════════════

// ─── Suite 1: Pure Utilities ─────────────────────────────
describe('Pure Utilities', () => {
  describe('slugify', () => {
    it('should convert spaces to hyphens and lowercase', () => {
      expect(win.slugify('Hello World')).toBe('hello-world');
    });
    it('should strip special characters', () => {
      expect(win.slugify('Hello @#$ World!')).toBe('hello-world');
    });
    it('should remove leading and trailing hyphens', () => {
      expect(win.slugify('--hello--')).toBe('hello');
    });
    it('should return untitled for empty string', () => {
      expect(win.slugify('')).toBe('untitled');
    });
    it('should return untitled for all-special chars', () => {
      expect(win.slugify('@#$%^&')).toBe('untitled');
    });
    it('should preserve numbers', () => {
      expect(win.slugify('Agent 42 v2')).toBe('agent-42-v2');
    });
  });

  describe('extractAcceptanceCriteria', () => {
    it('should extract bullet criteria under AC header', () => {
      const text = 'Acceptance criteria:\n- Should validate email\n- Must return 200\nOther stuff here';
      const result = win.extractAcceptanceCriteria(text);
      expect(result.length).toBe(2);
      expect(result[0]).toContain('validate email');
    });
    it('should extract numbered list criteria', () => {
      const text = 'Acceptance criteria:\n1. User can log in\n2. Error message displays on failure';
      const result = win.extractAcceptanceCriteria(text);
      expect(result.length).toBe(2);
    });
    it('should extract checkbox criteria', () => {
      const text = 'Acceptance criteria:\n- [ ] Should render correctly\n- [x] Must handle errors';
      const result = win.extractAcceptanceCriteria(text);
      expect(result.length).toBe(2);
    });
    it('should return empty array when no criteria found', () => {
      const result = win.extractAcceptanceCriteria('Just some plain text with no criteria.');
      expect(result.length).toBe(0);
    });
  });

  describe('isUrlOnly', () => {
    it('should detect URL-only input', () => {
      expect(win.isUrlOnly('https://jira.example.com/browse/PROJ-123')).toBe(true);
    });
    it('should reject plain text', () => {
      expect(win.isUrlOnly('Fix the login bug in the authentication module')).toBe(false);
    });
    it('should reject mixed URL and text', () => {
      expect(win.isUrlOnly('Check this ticket https://jira.example.com/browse/PROJ-123 and fix it please')).toBe(false);
    });
  });

  describe('isJiraKeyOnly', () => {
    it('should detect a single Jira key', () => {
      expect(win.isJiraKeyOnly('ACME-42')).toBe(true);
    });
    it('should detect multiple Jira keys', () => {
      expect(win.isJiraKeyOnly('ACME-42 PROJ-456')).toBe(true);
    });
    it('should reject plain text', () => {
      expect(win.isJiraKeyOnly('Fix the login bug')).toBe(false);
    });
    it('should reject a Jira key with meaningful prose', () => {
      expect(win.isJiraKeyOnly('ACME-42: fix the login bug in auth module')).toBe(false);
    });
    it('should reject lowercase key-like strings', () => {
      expect(win.isJiraKeyOnly('abc-123')).toBe(false);
    });
    it('should reject URLs', () => {
      expect(win.isJiraKeyOnly('https://team.atlassian.net/browse/ACME-42')).toBe(false);
    });
  });

  describe('getEffectivePrompt', () => {
    it('should prefer user prompt over template', () => {
      const node = { label:'Test', config:{ prompt:'My custom prompt', agentType:'coder', notes:'' }};
      expect(win.getEffectivePrompt(node)).toBe('My custom prompt');
    });
    it('should fall back to agent type template', () => {
      const node = { label:'Test', config:{ prompt:'', agentType:'planner', notes:'' }};
      const result = win.getEffectivePrompt(node);
      expect(result).toContain('implementation plan');
    });
    it('should use generic fallback for unmapped agent types', () => {
      const node = { label:'My Agent', config:{ prompt:'', agentType:'unknown_type_xyz', notes:'' }};
      const result = win.getEffectivePrompt(node);
      expect(result).toContain('Complete the task');
    });
  });

  describe('writer agent type', () => {
    it('should include writer in AGENT_TYPES', () => {
      const writer = win.AGENT_TYPES.find(a => a.id === 'writer');
      expect(!!writer).toBe(true);
      expect(writer.name).toBe('Writer');
      expect(win.AGENT_TYPES.length).toBe(11);
    });
    it('should return technical prompt for default style', () => {
      const node = { label:'Writer', config:{ prompt:'', agentType:'writer', notes:'' }};
      const result = win.getEffectivePrompt(node);
      expect(result).toContain('technical writer');
    });
    it('should return style-specific prompt for writingStyle', () => {
      const node = { label:'Writer', config:{ prompt:'', agentType:'writer', writingStyle:'business', notes:'' }};
      const result = win.getEffectivePrompt(node);
      expect(result).toContain('business writer');
    });
    it('should prefer custom prompt over template', () => {
      const node = { label:'Writer', config:{ prompt:'My custom writing prompt', agentType:'writer', writingStyle:'api', notes:'' }};
      expect(win.getEffectivePrompt(node)).toBe('My custom writing prompt');
    });
    it('should have PROMPTS key for each WRITING_STYLES entry', () => {
      win.WRITING_STYLES.forEach(s => {
        const key = 'writer' + win.capitalize(s.id);
        expect(!!win.PROMPTS[key]).toBe(true);
      });
    });
    it('should have WRITER_TOOL_DEFAULTS for each writing style', () => {
      win.WRITING_STYLES.forEach(s => {
        expect(Array.isArray(win.WRITER_TOOL_DEFAULTS[s.id])).toBe(true);
        expect(win.WRITER_TOOL_DEFAULTS[s.id].length > 0).toBe(true);
      });
    });
  });

  describe('getModelLabel', () => {
    it('should return correct label for known models', () => {
      expect(win.getModelLabel('opus-4.6')).toBe('Opus 4.6');
      expect(win.getModelLabel('sonnet-4.6')).toBe('Sonnet 4.6');
      expect(win.getModelLabel('haiku')).toBe('Haiku 4.5');
    });
  });
});

// ─── Suite 2: State Management ───────────────────────────
describe('State Management', () => {
  beforeEach(() => { resetState(); });

  describe('addNode', () => {
    it('should create node with correct type', () => {
      const node = win.addNode('agent', 100, 200, 'Test Agent');
      expect(node.type).toBe('agent');
      expect(node.label).toBe('Test Agent');
    });
    it('should increment nextId after adding node', () => {
      const id1 = win.state.nextId;
      win.addNode('agent', 100, 200, 'A');
      expect(win.state.nextId).toBe(id1 + 1);
    });
    it('should apply default config to new nodes', () => {
      const node = win.addNode('decision', 100, 200);
      expect(node.config.maxRevisions).toBe(3);
      expect(node.config.yesLabel).toBe('Yes');
      expect(node.config.noLabel).toBe('No');
    });
    it('should merge custom config with defaults', () => {
      const node = win.addNode('agent', 100, 200, 'X', { agentType:'backend', prompt:'Do API stuff' });
      expect(node.config.agentType).toBe('backend');
      expect(node.config.prompt).toBe('Do API stuff');
      expect(node.config.maxTurns).toBe(10);
    });
    it('should use default model for new agents', () => {
      win.state.defaultModel = 'sonnet-4.6';
      const node = win.addNode('agent', 100, 200, 'A');
      expect(node.config.model).toBe('sonnet-4.6');
    });
    it('should set maxRevisions to 3 for decision nodes', () => {
      const node = win.addNode('decision', 100, 200, 'Gate');
      expect(node.config.maxRevisions).toBe(3);
    });
  });

  describe('addConnection', () => {
    it('should create connection between nodes', () => {
      const a = win.addNode('agent', 100, 200, 'A');
      const b = win.addNode('agent', 300, 200, 'B');

// ─── Suite 17: Auto Layout ──────────────────────────────
describe('Auto Layout', () => {
  beforeEach(() => { clearStorage(); resetState(); });

  describe('linear chain', () => {
    it('should place nodes left-to-right in ascending x order', () => {
      const refs = buildTestWorkflow('linear');
      win.autoLayout();
      expect(refs.input.x < refs.planner.x).toBe(true);
      expect(refs.planner.x < refs.implementer.x).toBe(true);
      expect(refs.implementer.x < refs.output.x).toBe(true);
    });

    it('should place all nodes on the same y (single row)', () => {
      const refs = buildTestWorkflow('linear');
      win.autoLayout();
      expect(refs.input.y).toBe(refs.planner.y);
      expect(refs.planner.y).toBe(refs.implementer.y);
      expect(refs.implementer.y).toBe(refs.output.y);
    });

    it('should assign each layer a unique x position', () => {
      const refs = buildTestWorkflow('linear');
      win.autoLayout();
      const xs = [refs.input.x, refs.planner.x, refs.implementer.x, refs.output.x];
      const unique = new Set(xs);
      expect(unique.size).toBe(4);
    });
  });

  describe('decision loop', () => {
    it('should place output node rightmost (last layer)', () => {
      const refs = buildTestWorkflow('decision');
      win.autoLayout();
      const allX = win.state.nodes.map(n => n.x);
      const maxX = Math.max(...allX);
      expect(refs.output.x).toBe(maxX);
    });

    it('should not corrupt layer ordering from back-edge', () => {
      const refs = buildTestWorkflow('decision');
      win.autoLayout();
      expect(refs.input.x < refs.implementer.x).toBe(true);
      expect(refs.implementer.x < refs.reviewer.x).toBe(true);
      expect(refs.reviewer.x < refs.decision.x).toBe(true);
      expect(refs.decision.x < refs.tester.x).toBe(true);
      expect(refs.tester.x < refs.output.x).toBe(true);
    });
  });

  describe('parallel fork', () => {
    it('should place forked branches on the same x layer', () => {
      const refs = buildTestWorkflow('parallel');
      win.autoLayout();
      expect(refs.backend.x).toBe(refs.frontend.x);
    });

    it('should place forked branches at different y positions', () => {
      const refs = buildTestWorkflow('parallel');
      win.autoLayout();
      expect(refs.backend.y === refs.frontend.y).toBe(false);
    });

    it('should place reviewer after both branches', () => {
      const refs = buildTestWorkflow('parallel');
      win.autoLayout();
      expect(refs.reviewer.x > refs.backend.x).toBe(true);
      expect(refs.reviewer.x > refs.frontend.x).toBe(true);
    });
  });

  describe('complex workflow', () => {
    it('should place output as rightmost node', () => {
      const refs = buildTestWorkflow('complex');
      win.autoLayout();
      const allX = win.state.nodes.map(n => n.x);
      const maxX = Math.max(...allX);
      expect(refs.output.x).toBe(maxX);
    });

    it('should place parallel branches on a shared layer', () => {
      const refs = buildTestWorkflow('complex');
      win.autoLayout();
      expect(refs.backend.x).toBe(refs.frontend.x);
    });

    it('should place reviewer after latest branch in fork-join convergence', () => {
      const refs = buildTestWorkflow('complex');
      win.autoLayout();
      expect(refs.reviewer.x > refs.backend.x).toBe(true);
      expect(refs.reviewer.x > refs.frontend.x).toBe(true);
    });

    it('should place decision gate after reviewer and tester after decision', () => {
      const refs = buildTestWorkflow('complex');
      win.autoLayout();
      expect(refs.decision.x > refs.reviewer.x).toBe(true);
      expect(refs.tester.x > refs.decision.x).toBe(true);
    });
  });

  describe('edge cases', () => {
    it('should not throw on empty state', () => {
      resetState();
      let threw = false;
      try { win.autoLayout(); } catch (e) { threw = true; }
      expect(threw).toBe(false);
    });

    it('should position single node without error', () => {
      resetState();
      const n = win.addNode('agent', 0, 0, 'Solo', { agentType:'coder', model:'opus-4.6', tools:['Read'], prompt:'Go.', maxTurns:5 });
      win.autoLayout();
      expect(typeof n.x).toBe('number');
      expect(typeof n.y).toBe('number');
    });

    it('should position all disconnected nodes', () => {
      resetState();
      const a = win.addNode('agent', 0, 0, 'A', { agentType:'coder', model:'opus-4.6', tools:['Read'], prompt:'A.', maxTurns:5 });
      const b = win.addNode('agent', 0, 0, 'B', { agentType:'coder', model:'opus-4.6', tools:['Read'], prompt:'B.', maxTurns:5 });
      win.autoLayout();
      expect(typeof a.x).toBe('number');
      expect(typeof b.x).toBe('number');
    });
  });
});

  describe('secret scanner', () => {
    it('should detect API keys', () => {

      expect(found[0]).toContain('API key');
    });
    it('should detect AWS keys', () => {
      const found = win.scanForSecrets('aws key: AKIAIOSFODNN7EXAMPLE');
      expect(found.length > 0).toBe(true);
      expect(found[0]).toContain('AWS');
    });
    it('should detect connection strings', () => {
      const found = win.scanForSecrets('mongodb://user:pass@host:27017/db');

    });
    it('should detect password assignments', () => {
      const found = win.scanForSecrets('password="supersecret123"');
      expect(found.length > 0).toBe(true);
    });
    it('should not flag normal text', () => {
      const found = win.scanForSecrets('Build a REST API with user authentication and OAuth2 login');
      expect(found.length).toBe(0);
    });
    it('should detect GitHub tokens', () => {
      const found = win.scanForSecrets('ghp_ABCDEFghijklmnopqrstuvwxyz0123456789');
      expect(found.length > 0).toBe(true);
    });
    it('should detect private keys', () => {
      const found = win.scanForSecrets('-----BEGIN RSA PRIVATE KEY-----');
      expect(found.length > 0).toBe(true);
    });

  describe('new prompt categories', () => {
    it('should have Code Generation category', () => {
      const cat = win.PROMPT_LIBRARY.find(c => c.category === 'Code Generation');
      expect(cat.prompts.length >= 2).toBe(true);
    });
    it('should have Git & Code Review category', () => {
      const cat = win.PROMPT_LIBRARY.find(c => c.category === 'Git & Code Review');
      expect(cat.prompts.length >= 2).toBe(true);
    });
    it('should have Strategy & Analysis category', () => {
      const cat = win.PROMPT_LIBRARY.find(c => c.category === 'Strategy & Analysis');
      expect(cat.prompts.length >= 3).toBe(true);
    });
    it('should have OWASP and Secrets prompts in Security', () => {
      const cat = win.PROMPT_LIBRARY.find(c => c.category === 'Security');
      expect(cat.prompts.find(p => p.title === 'OWASP Top 10 Audit').prompt.length > 200).toBe(true);
      expect(cat.prompts.find(p => p.title === 'Secrets & Credentials Scan').prompt.length > 200).toBe(true);
    });
  });

  describe('favorites', () => {
    it('should add and remove favorites', () => {
      win.state.plibFavs = [];
      win.toggleFavorite(0, 0);
      expect(win.state.plibFavs).toContain('0:0');
      win.toggleFavorite(0, 0);
      expect(win.state.plibFavs.includes('0:0')).toBe(false);
    });
    it('should render favorites section when favorites exist', () => {
      win.state.plibFavs = ['0:0'];
      const overlay = win.document.getElementById('promptLibOverlay');
      overlay.dataset.rendered = '';

      const favCards = win.document.querySelectorAll('.plib-cat-items.show .plib-card');
      expect(favCards.length >= 1).toBe(true);
    });
    it('should show filled star for favorited prompts', () => {
      win.state.plibFavs = ['0:0'];
      const card = win.buildPromptCard(win.PROMPT_LIBRARY[0].prompts[0], 0, 0);
      expect(card.querySelector('.plib-fav.on')).toBe(card.querySelector('.plib-fav'));
    });
    it('should show empty star for non-favorited prompts', () => {
      win.state.plibFavs = [];
      const card = win.buildPromptCard(win.PROMPT_LIBRARY[0].prompts[0], 0, 0);
      expect(card.querySelector('.plib-fav.on')).toBe(null);
    });
  });

  describe('prompt library search', () => {
    it('should filter prompts by search query', () => {
      const overlay = win.document.getElementById('promptLibOverlay');
      overlay.dataset.rendered = '';
      win.togglePromptLib();
      win.filterPromptLib('security');
      const visible = [...win.document.querySelectorAll('.plib-card')].filter(c => c.style.display !== 'none');
      expect(visible.length > 0).toBe(true);
      expect(visible.length < win.PROMPT_LIBRARY.reduce((s, c) => s + c.prompts.length, 0)).toBe(true);
      win.filterPromptLib('');
      win.togglePromptLib();
    });
    it('should hide categories with no matching prompts', () => {
      win.filterPromptLib('xyznonexistent');
      const visibleCats = [...win.document.querySelectorAll('.plib-category')].filter(c => c.style.display !== 'none');
      expect(visibleCats.length).toBe(0);
      win.filterPromptLib('');
    });
  });

  describe('undo/redo', () => {
    it('should undo adding a node', () => {
      resetState();
      const before = win.state.nodes.length;
      win.addNode('agent', 100, 100, 'Test', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      expect(win.state.nodes.length).toBe(before + 1);
      win.undo();
      expect(win.state.nodes.length).toBe(before);
    });
    it('should redo after undo', () => {
      resetState();
      win.addNode('agent', 100, 100, 'Test', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      const afterAdd = win.state.nodes.length;
      win.undo();
      win.redo();
      expect(win.state.nodes.length).toBe(afterAdd);
    });
    it('should undo deleting a node', () => {
      resetState();
      const n = win.addNode('agent', 100, 100, 'Deleteme', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });

      win.deleteNode(n.id);
      expect(win.state.nodes.length).toBe(countAfterAdd - 1);
      win.undo();
      expect(win.state.nodes.length).toBe(countAfterAdd);
    });
    it('should clear redo stack on new action', () => {
      resetState();
      win.addNode('agent', 100, 100, 'A', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      win.undo();
      win.addNode('agent', 200, 200, 'B', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'y', maxTurns: 5 });
      win.redo(); // Should do nothing since redo was cleared
      expect(win.state.nodes.filter(n => n.label === 'A').length).toBe(0);
    });
  });

  describe('workflow validation', () => {
    it('should report disconnected nodes', () => {
      resetState();
      win.addNode('agent', 100, 100, 'Lonely', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });

      expect(warnings[0].msg).toContain('Lonely');
    });
    it('should report no issues for a valid workflow', () => {
      resetState();
      win.loadPreset('feature');
      const warnings = win.validateWorkflow();
      expect(warnings.length).toBe(0);
    });
  });

  describe('token estimate', () => {
    it('should estimate roughly 4 chars per token', () => {
      expect(win.estimateTokens('abcd')).toBe(1);
      expect(win.estimateTokens('a'.repeat(400))).toBe(100);
    });
  });

  describe('duplicate workflow', () => {
    it('should clone the current workflow with a new name', () => {
      resetState();
      win.loadPreset('feature');
      win.document.getElementById('workflowName').value = 'Original';
      const nodeCount = win.state.nodes.length;
      win.duplicateWorkflow();
      expect(win.state.nodes.length).toBe(nodeCount);
      expect(win.document.getElementById('workflowName').value).toBe('Original (copy)');
    });
  });

  describe('configInput attrs parameter', () => {
    it('should include extra attributes when provided', () => {
      const html = win.configInput('Test', 'test', '5', 'number', '', 'min="1" max="50"');
      expect(html).toContain('min="1"');
      expect(html).toContain('max="50"');
    });
    it('should work without extra attributes', () => {
      const html = win.configInput('Test', 'test', 'hello', 'text');
      expect(html).toContain('value="hello"');
      expect(html.includes('undefined')).toBe(false);
    });
  });
});

// ─── Suite 19: Coverage Gaps ────────────────────────────────
describe('Coverage Gaps', () => {
  beforeEach(() => { clearStorage(); resetState(); });

  describe('node operations', () => {
    it('should deep-copy tools array when duplicating a node', () => {
      const n = win.addNode('agent', 100, 100, 'Original', { agentType: 'coder', model: 'opus-4.6', tools: ['Read', 'Write'], prompt: 'test', maxTurns: 5 });
      win.state.selectedId = n.id;
      win.duplicateNode();
      const copy = win.state.nodes.find(x => x.label === 'Original (copy)');
      expect(copy).toBe(copy); // exists
      copy.config.tools.push('Bash');
      expect(n.config.tools.includes('Bash')).toBe(false); // original not mutated
    });
    it('should disconnect all connections from a node', () => {
      const a = win.addNode('agent', 0, 0, 'A', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      const b = win.addNode('agent', 100, 0, 'B', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      const c = win.addNode('agent', 200, 0, 'C', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      win.addConnection(a.id, b.id);
      win.addConnection(b.id, c.id);
      win.state.selectedId = b.id;
      win.disconnectNode();
      expect(win.state.connections.length).toBe(0);
    });
    it('should deleteSelected for a connection', () => {
      const a = win.addNode('agent', 0, 0, 'A', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      const b = win.addNode('agent', 100, 0, 'B', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      const conn = win.addConnection(a.id, b.id);
      win.state.selectedId = conn.id;
      win.deleteSelected();
      expect(win.state.connections.length).toBe(0);
      expect(win.state.nodes.length).toBe(2); // nodes preserved
    });
  });

  describe('undo/redo batch operations', () => {
    it('should undo an entire preset load in one step', () => {
      win.addNode('agent', 0, 0, 'Keeper', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'keep me', maxTurns: 5 });
      const beforeCount = win.state.nodes.length;
      win.loadPreset('feature');
      expect(win.state.nodes.length > beforeCount).toBe(true);
      win.undo();
      expect(win.state.nodes.length).toBe(beforeCount);
      expect(win.state.nodes[0].label).toBe('Keeper');
    });
    it('should undo generateFromStory in one step', () => {
      win.addNode('agent', 0, 0, 'Existing', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'here', maxTurns: 5 });
      const beforeCount = win.state.nodes.length;
      win.document.getElementById('storyInput').value = 'Build a REST API with authentication and database integration';
      win.generateFromStory();
      expect(win.state.nodes.length > beforeCount).toBe(true);
      win.undo();
      expect(win.state.nodes.length).toBe(beforeCount);
      expect(win.state.nodes[0].label).toBe('Existing');
    });
    it('should undo clearCanvas in one step', () => {
      win.loadPreset('feature');
      const beforeCount = win.state.nodes.length;
      win.clearCanvas(true);
      expect(win.state.nodes.length).toBe(0);
      win.undo();
      expect(win.state.nodes.length).toBe(beforeCount);
    });
    it('should handle undo when stack is empty', () => {
      resetState();
      win.undo(); // should not throw
      expect(win.state.nodes.length).toBe(0);
    });
    it('should handle redo when stack is empty', () => {
      resetState();
      win.redo(); // should not throw
      expect(win.state.nodes.length).toBe(0);
    });
  });

  describe('serialization edge cases', () => {
    it('should roundtrip empty workflow', () => {
      const data = win.serializeWorkflow();
      expect(data.canvas.nodes.length).toBe(0);
      expect(data.canvas.connections.length).toBe(0);
    });
    it('should roundtrip node labels with special characters', () => {
      win.addNode('agent', 0, 0, 'Agent "quoted" & <tagged>', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'test', maxTurns: 5 });
      const data = win.serializeWorkflow();
      resetState();
      win.deserializeWorkflow(data);
      expect(win.state.nodes[0].label).toBe('Agent "quoted" & <tagged>');
    });
    it('should roundtrip single disconnected node', () => {
      win.addNode('output', 0, 0, 'Solo Output', { deliverable: 'test', format: 'code' });
      const data = win.serializeWorkflow();
      resetState();
      win.deserializeWorkflow(data);
      expect(win.state.nodes.length).toBe(1);
      expect(win.state.nodes[0].label).toBe('Solo Output');
    });
  });

  describe('export edge cases', () => {
    it('should handle single-agent workflow in all formats', () => {
      win.addNode('agent', 0, 0, 'Solo', { agentType: 'coder', model: 'opus-4.6', tools: ['Read', 'Write'], prompt: 'Do something', maxTurns: 5 });
      const wf = win.genWorkflow();
      const sa = win.genSubAgents();
      const at = win.genAgentTeams();
      const sdk = win.genAgentSDK();
      const cp = win.genClaudePrompt();
      [wf, sa, at, sdk, cp].forEach(output => {
        expect(output).toContain('Solo');
        expect(output.length > 50).toBe(true);
      });
    });
    it('should include decision condition even without revision connection', () => {
      const a = win.addNode('agent', 0, 0, 'Worker', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'work', maxTurns: 5 });
      const d = win.addNode('decision', 100, 0, 'Review', { condition: 'All tests pass', yesLabel: 'Pass', noLabel: 'Fail' });
      win.addConnection(a.id, d.id);
      const output = win.genSubAgents();
      expect(output).toContain('All tests pass');
    });
    it('should use default decision labels when not specified', () => {
      const a = win.addNode('agent', 0, 0, 'Worker', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'work', maxTurns: 5 });
      const d = win.addNode('decision', 100, 0, 'Check', { condition: 'Quality OK', yesLabel: '', noLabel: '' });
      win.addConnection(a.id, d.id);
      const output = win.genWorkflow();
      expect(output).toContain('Quality OK');
    });
  });

  describe('clearCanvas completeness', () => {
    it('should clear all state including selectedId', () => {
      win.loadPreset('feature');
      win.state.selectedId = win.state.nodes[0].id;
      win.clearCanvas(true);
      expect(win.state.nodes.length).toBe(0);
      expect(win.state.connections.length).toBe(0);
      expect(win.state.selectedId).toBe(null);
    });
    it('should clear form inputs', () => {
      win.document.getElementById('workflowName').value = 'Test Workflow';
      win.document.getElementById('storyInput').value = 'Some requirements';
      win.clearCanvas(true);
      expect(win.document.getElementById('workflowName').value).toBe('');
      expect(win.document.getElementById('storyInput').value).toBe('');
    });
  });

  describe('secret scanner edge cases', () => {
    it('should not flag the word password in normal text', () => {
      const found = win.scanForSecrets('Set up a password manager for the team');
      expect(found.length).toBe(0);
    });
    it('should flag password assignment with value', () => {
      const found = win.scanForSecrets('password="hunter2abc"');
      expect(found.length > 0).toBe(true);
    });
    it('should not flag short sk- strings', () => {
      const found = win.scanForSecrets('Use sk-tool for deployment');
      expect(found.length).toBe(0);
    });
    it('should handle empty input', () => {
      const found = win.scanForSecrets('');
      expect(found.length).toBe(0);
    });
  });

  describe('validation edge cases', () => {
    it('should warn about decision nodes with less than 2 outputs', () => {
      const d = win.addNode('decision', 0, 0, 'Check', { condition: 'test' });
      const a = win.addNode('agent', 100, 0, 'Worker', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      win.addConnection(d.id, a.id); // only 1 output
      const warnings = win.validateWorkflow();
      const decisionWarning = warnings.find(w => w.msg.includes('pass and fail'));
      expect(decisionWarning.msg).toContain('Check');
    });
    it('should warn about General agents with empty prompts', () => {
      win.addNode('agent', 0, 0, 'Empty General', { agentType: 'general', model: 'opus-4.6', tools: ['Read'], prompt: '', maxTurns: 5 });
      const a2 = win.addNode('agent', 100, 0, 'Has Prompt', { agentType: 'general', model: 'opus-4.6', tools: ['Read'], prompt: 'do stuff', maxTurns: 5 });
      win.addConnection(win.state.nodes[0].id, a2.id);
      const warnings = win.validateWorkflow();
      const promptWarning = warnings.find(w => w.msg.includes('no prompt'));
      expect(promptWarning.msg).toContain('Empty General');
    });
    it('should not warn about typed agents with empty prompts', () => {
      const a = win.addNode('agent', 0, 0, 'Coder', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: '', maxTurns: 5 });
      const b = win.addNode('agent', 100, 0, 'Next', { agentType: 'coder', model: 'opus-4.6', tools: ['Read'], prompt: 'x', maxTurns: 5 });
      win.addConnection(a.id, b.id);
      const warnings = win.validateWorkflow();
      const promptWarning = warnings.find(w => w.msg.includes('no prompt'));
      expect(promptWarning).toBe(undefined);
    });
  });

  describe('presets should have no validation warnings', () => {
    const presetNames = ['feature', 'bugfix', 'fullstack', 'review', 'parallel_research', 'swarm',
      'test_automation', 'ui_component', 'refactoring', 'documentation', 'devops', 'performance', 'testing', 'data_migration'];
    presetNames.forEach(preset => {
      it('should have zero warnings for ' + preset, () => {
        resetState();
        win.loadPreset(preset);
        const warnings = win.validateWorkflow();
        expect(warnings.length).toBe(0);
      });
    });
  });

  describe('token estimation edge cases', () => {
    it('should return 0 for empty string', () => {
      expect(win.estimateTokens('')).toBe(0);
    });
    it('should return 1 for short strings', () => {
      expect(win.estimateTokens('hi')).toBe(1);
    });
  });
});

document.getElementById('app').addEventListener('load', function() {
  win = this.contentWindow;
  // Expose let-scoped 'state' as a window property so tests can access it.
  // win.eval() is indirect eval (global scope only, can't see let declarations).
  // Injecting a <script> tag works because inline scripts share the global lexical env.
  const s = win.document.createElement('script');
  s.textContent = 'window.state = state; window.AGENT_TYPES = AGENT_TYPES; window.PROMPTS = PROMPTS; window.WRITING_STYLES = WRITING_STYLES; window.WRITER_TOOL_DEFAULTS = WRITER_TOOL_DEFAULTS; window.sourcebotHint = sourcebotHint; window.customMcpHint = customMcpHint; window.atlassianHint = atlassianHint; window.getPlan = getPlan; window.serializeWorkflow = serializeWorkflow; window.generateRefinePrompt = generateRefinePrompt; window.generatePlanPrompt = generatePlanPrompt; window.slugify = slugify; window.autoLayout = autoLayout; window.toggleHelp = toggleHelp; window.configInput = configInput; window.copyPrompt = copyPrompt; window.togglePromptLib = togglePromptLib; window.PROMPT_LIBRARY = PROMPT_LIBRARY; window.renderPromptLib = renderPromptLib; window.copyLibPrompt = copyLibPrompt; window.closePlibInput = closePlibInput; window.confirmPlibInput = confirmPlibInput; window.validateStoryInput = validateStoryInput; window.scanForSecrets = scanForSecrets; window.toggleFavorite = toggleFavorite; window.buildPromptCard = buildPromptCard; window.filterPromptLib = filterPromptLib; window.undo = undo; window.redo = redo; window.validateWorkflow = validateWorkflow; window.estimateTokens = estimateTokens; window.duplicateWorkflow = duplicateWorkflow; window.duplicateNode = duplicateNode; window.disconnectNode = disconnectNode; window.deleteSelected = deleteSelected; window.deleteConnection = deleteConnection; window.genWorkflow = genWorkflow; window.genSubAgents = genSubAgents; window.genAgentTeams = genAgentTeams; window.genAgentSDK = genAgentSDK; window.genClaudePrompt = genClaudePrompt; window.deserializeWorkflow = deserializeWorkflow;';
  win.document.head.appendChild(s);
  // Bypass all confirm() dialogs
  win.confirm = () => true;
  // Clear localStorage to start fresh
  clearStorage();
  resetState();
  // Run tests
  runAll(win);
});
